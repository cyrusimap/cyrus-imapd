name: Cyrus IMAP CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - 'cyrus-imapd-*'
  pull_request:
    branches:
      - master
      - main
      - 'cyrus-imapd-*'

defaults:
  run:
    shell: bash
env:
  CYRUS_CLONE_ROOT: /dev/shm2/cyrus-imapd

jobs:
  build:
    name: "${{ matrix.desc }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: "--gcc"
            desc: "gcc w/cass"
          - compiler: "--clang"
            desc: "clang w/cass"
          - compiler: "--gcc"
            desc: "gcc+ubsan w/cass"
            san: "--ubsan"
          - compiler: "--gcc"
            desc: "gcc+asan w/cass"
            san: "--asan"
            skip: "!Cyrus::LibCyrus"
          - compiler: "--gcc"
            # -Og finds more errors at compile time
            desc: "gcc -Og cunit"
            cflags: "-Og"
            cxxflags: "-Og"
            skip-cass: 1
          - compiler: "--gcc"
            desc: "Non-UTC timezone"
            pretest: "ln -sf /usr/share/zoneinfo/America/New_York /etc/localtime && sudo dpkg-reconfigure --frontend noninteractive tzdata"
          - compiler: "--gcc"
            desc: "gcc -Og debian trixie"
            cflags: "-Og"
            cxxflags: "-Og"
            image: "ghcr.io/cyrusimap/cyrus-docker:trixie"
    runs-on: ubuntu-latest
    container:
        image: ${{ matrix.image || 'ghcr.io/cyrusimap/cyrus-docker:bookworm' }}
        options: --init --privileged --shm-size 4GB --tmpfs /dev/shm2:exec,size=1G
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: move repo to tmpfs
      run: |
        mv /__w/cyrus-imapd/cyrus-imapd /dev/shm2/cyrus-imapd
        mkdir /dev/shm2/cyrus
        ln -s /dev/shm2/cyrus /usr/cyrus
        mv /usr/local/cyruslibs /dev/shm2/cyruslibs
        ln -s /dev/shm2/cyruslibs /usr/local/cyruslibs
    - name: setup git safe directory
      working-directory: /dev/shm2/cyrus-imapd
      run: git config --global --add safe.directory /dev/shm2/cyrus-imapd
    - name: override kernel core pattern
      working-directory: /dev/shm2/cyrus-imapd
      run: sudo sysctl -w kernel.core_pattern=core.%p
    - name: fetch upstream release tags
      working-directory: /dev/shm2/cyrus-imapd
      if: ${{ github.repository != 'cyrusimap/cyrus-imapd' }}
      run: |
        git remote add upstream https://github.com/cyrusimap/cyrus-imapd.git
        # n.b. --no-tags does not mean "no tags", it means "no automatic tag
        # following".  we're explicitly fetching the tags we want, we do not
        # need every other tag that's reachable from them
        git fetch --no-tags upstream 'refs/tags/cyrus-imapd-*:refs/tags/cyrus-imapd-*'
    - name: Run pre-test code if any
      working-directory: /dev/shm2/cyrus-imapd
      if: ${{ matrix.pretest }}
      run: ${{ matrix.pretest }}
    - name: configure and build
      working-directory: /dev/shm2/cyrus-imapd
      run: cyd build "${{ matrix.compiler }}" "${{ matrix.san }}" --cflags "${{ matrix.cflags }}" --cxxflags "${{ matrix.cxxflags }}"
    - name: report version information
      working-directory: /dev/shm2/cyrus-imapd
      run: |
        echo "debian" $(cat /etc/debian_version)
        echo "Mail::IMAPTalk" $(cpanm --info Mail::IMAPTalk)
        /usr/cyrus/libexec/master -V
        /usr/cyrus/sbin/cyr_buildinfo
    - name: run cassandane quietly
      working-directory: /dev/shm2/cyrus-imapd
      if: ${{ ! matrix.skip-cass }}
      id: cass1
      continue-on-error: true
      run: cyd test --no-ok --slow --format prettier "${{ matrix.skip }}"
    - name: rerun cassandane failures noisily
      working-directory: /dev/shm2/cyrus-imapd
      if: ${{ steps.cass1.outcome == 'failure' }}
      run: cyd test --no-slow --format pretty --rerun
    - name: collect logs
      working-directory: /dev/shm2/cyrus-imapd
      if: ${{ ! matrix.skip-cass }}
      run: cat /dev/shm/cass/*/conf/log/syslog
  valgrind-make-check:
    runs-on: ubuntu-latest
    container:
        image: ghcr.io/cyrusimap/cyrus-docker:bookworm
        options: --init --privileged --shm-size 4GB --tmpfs /dev/shm2:exec,size=1G
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: move repo to tmpfs
      run: |
        mv /__w/cyrus-imapd/cyrus-imapd /dev/shm2/cyrus-imapd
        mkdir /dev/shm2/cyrus
        ln -s /dev/shm2/cyrus /usr/cyrus
        mv /usr/local/cyruslibs /dev/shm2/cyruslibs
        ln -s /dev/shm2/cyruslibs /usr/local/cyruslibs
    - name: setup git safe directory
      working-directory: /dev/shm2/cyrus-imapd
      run: git config --global --add safe.directory /dev/shm2/cyrus-imapd
    - name: fetch upstream release tags
      working-directory: /dev/shm2/cyrus-imapd
      if: ${{ github.repository != 'cyrusimap/cyrus-imapd' }}
      run: |
        git remote add upstream https://github.com/cyrusimap/cyrus-imapd.git
        # n.b. --no-tags does not mean "no tags", it means "no automatic tag
        # following".  we're explicitly fetching the tags we want, we do not
        # need every other tag that's reachable from them
        git fetch --no-tags upstream 'refs/tags/cyrus-imapd-*:refs/tags/cyrus-imapd-*'
    - name: configure and build
      working-directory: /dev/shm2/cyrus-imapd
      run: |
        echo "building cyrus version" $(./tools/git-version.sh)
        cyd build
    - name: make check with valgrind
      working-directory: /dev/shm2/cyrus-imapd
      run: |
        make VG=1 check-discrete
    - name: report version information
      working-directory: /dev/shm2/cyrus-imapd
      run: |
        echo "debian" $(cat /etc/debian_version)
        /usr/cyrus/libexec/master -V
        /usr/cyrus/sbin/cyr_buildinfo

  distcheck:
    runs-on: ubuntu-latest
    container:
        image: ghcr.io/cyrusimap/cyrus-docker:bookworm
        options: --init --privileged --shm-size 4GB --tmpfs /dev/shm2:exec,size=1G
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: move repo to tmpfs
      run: |
        mv /__w/cyrus-imapd/cyrus-imapd /dev/shm2/cyrus-imapd
        mkdir /dev/shm2/cyrus
        ln -s /dev/shm2/cyrus /usr/cyrus
        mv /usr/local/cyruslibs /dev/shm2/cyruslibs
        ln -s /dev/shm2/cyruslibs /usr/local/cyruslibs
    - name: setup git safe directory
      working-directory: /dev/shm2/cyrus-imapd
      run: git config --global --add safe.directory /dev/shm2/cyrus-imapd
    - name: fetch upstream release tags
      working-directory: /dev/shm2/cyrus-imapd
      if: ${{ github.repository != 'cyrusimap/cyrus-imapd' }}
      run: |
        git remote add upstream https://github.com/cyrusimap/cyrus-imapd.git
        # n.b. --no-tags does not mean "no tags", it means "no automatic tag
        # following".  we're explicitly fetching the tags we want, we do not
        # need every other tag that's reachable from them
        git fetch --no-tags upstream 'refs/tags/cyrus-imapd-*:refs/tags/cyrus-imapd-*'
    - name: configure and build
      working-directory: /dev/shm2/cyrus-imapd
      run: |
        echo "distchecking cyrus version" $(./tools/git-version.sh)
        cyd distcheck --brief
