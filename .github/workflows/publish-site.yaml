# Based on these workflows:
# Sample workflow for building and deploying a Jekyll site to GitHub Pages
# https://github.com/actions/upload-pages-artifact
# docs.yaml
# main.yaml
# publish-site.yml from the site repository

name: "Build and publish www.cyrusimap.org"

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  CYRUS_CLONE_ROOT: /__w/cyrus-imapd/cyrus-imapd

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cyrusimap/cyrus-docker:trixie
      options: --init --privileged
    # This must have fetch-depth 0 because the script we run clones it further
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: setup git safe directory
        run: git config --global --add safe.directory /__w/cyrus-imapd/cyrus-imapd
      - name: build the documentation site
        run: cyd makesite
      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v3  # or specific "vX.X.X" version tag for this action
        with:
          path: /tmp/CYRUS_DOCS_BUILD_DIR/cyrus-site/
  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # This is the latest version, and it warns. Hopefully will be fixed soon:
    # https://github.com/actions/deploy-pages/issues/410
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
