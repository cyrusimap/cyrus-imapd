# Based on these workflows:
# Sample workflow for building and deploying a Jekyll site to GitHub Pages
# https://github.com/actions/upload-pages-artifact
# docs.yaml
# main.yaml
# publish-site.yml from the site repository

name: "Build and publish www.cyrusimap.org"

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch: {}

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
#
# To clarify
#
#   This means that there can be at most one running and one pending job in a
#   concurrency group at any time. When a concurrent job or workflow is queued,
#   if another job or workflow using the same concurrency group in the
#   repository is in progress, the queued job or workflow will be pending. Any
#   existing pending job or workflow in the same concurrency group, if it
#   exists, will be canceled and the new queued job or workflow will take its
#   place.
#
# https://docs.github.com/en/actions/how-tos/write-workflows/choose-when-workflows-run/control-workflow-concurrency#using-concurrency-in-different-scenarios
#
# meaning that any running job will run to completion (hopefully success and
# hence publish), and then the job for now-current master will start

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  CYRUS_CLONE_ROOT: /__w/cyrus-imapd/cyrus-imapd

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    # Need --privileged to set kernel.core_pattern
    # In turn, need to do that for the coredump tests
    container:
      image: ghcr.io/cyrusimap/cyrus-docker:trixie
      options: --init --privileged
    # This must have fetch-depth 0 because the script we run clones it further
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: setup git safe directory
        run: git config --global --add safe.directory /__w/cyrus-imapd/cyrus-imapd
      - name: build the documentation site
        run: cyd makesite
      # This might seem optional, but git-version.sh needs the tags:
      - name: fetch upstream release tags
        if: ${{ github.repository != 'cyrusimap/cyrus-imapd' }}
        run: |
          git remote add upstream https://github.com/cyrusimap/cyrus-imapd.git
          # n.b. --no-tags does not mean "no tags", it means "no automatic tag
          # following".  we're explicitly fetching the tags we want, we do not
          # need every other tag that's reachable from them
          git fetch --no-tags upstream 'refs/tags/cyrus-imapd-*:refs/tags/cyrus-imapd-*'
      - name: override kernel core pattern
        run: sudo sysctl -w kernel.core_pattern=core.%p
      - name: build and generate a coverage report
        run: cyd coverage
      - name: move it into the site
        run: mv $CYRUS_CLONE_ROOT/coverage /tmp/CYRUS_DOCS_BUILD_DIR/cyrus-site/
      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/CYRUS_DOCS_BUILD_DIR/cyrus-site/
  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
